name: Deploy Dinosaur Go to GitHub Pages

on:
  push:
    branches:
      - claude/dinosaur-go-ar-app-c8ebg1
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (source = GitHub Actions) automatically so no manual
          # toggle in repo settings is required for the first deploy.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
